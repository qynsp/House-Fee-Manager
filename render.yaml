# Render deployment configuration for House Fee Manager (Telegram Bingo App)
# Free tier: web service spins down after 15 min of inactivity (cold start ~30s).
# Database: Neon free PostgreSQL (https://neon.tech)

services:
  - type: web
    name: house-fee-manager
    env: node
    plan: free
    region: oregon
    # corepack reads packageManager from package.json ("pnpm@9.15.0") and
    # activates the correct pnpm version without needing a global npm install.
    buildCommand: "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/bingo-app run build && pnpm --filter @workspace/api-server run build"
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
