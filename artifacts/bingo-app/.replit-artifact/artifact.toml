kind = "web"
previewPath = "/"
title = "Telegram Bingo"
version = "1.0.0"
id = "artifacts/bingo-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23158

[services.development]
run = "pnpm --filter @workspace/bingo-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bingo-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/bingo-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23158"
BASE_PATH = "/"
